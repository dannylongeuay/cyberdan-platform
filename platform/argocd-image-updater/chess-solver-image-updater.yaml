apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: chess-solver
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      branch: main
      writeBackTarget: kustomization
  applicationRefs:
    - namePattern: chess-solver
      images:
        - alias: chess-solver
          imageName: "ghcr.io/dannylongeuay/cyberdan-chess-solver:1.x"
          commonUpdateSettings:
            updateStrategy: semver
